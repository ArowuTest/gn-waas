server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api/ {
        # CF-H01 fix: use Docker service name (api-gateway) not localhost.
        # Inside a Docker bridge network, localhost resolves to the nginx container
        # itself, not the api-gateway container. Docker DNS resolves service names.
        # Note: VITE_API_URL=localhost:3000 is still correct — that is a browser-side
        # build variable used by the React app JS bundle running in the user's browser.
        proxy_pass http://api-gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # INFRA-03 fix: add Content-Security-Policy to mitigate XSS attacks.
    # Allows scripts/styles from self and the CDN used by the React build.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    # INFRA-03 fix: HSTS — force HTTPS for 1 year (enable once TLS is configured).
    # max-age=31536000 (1 year); includeSubDomains; preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permissions-Policy: restrict access to sensitive browser APIs
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
}
