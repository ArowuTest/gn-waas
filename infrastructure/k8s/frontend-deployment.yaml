# GN-WAAS — Kubernetes Deployments for Frontend Portals
# Covers: admin-portal, authority-portal, gwl-portal
# Each portal is a static React/Vite SPA served by nginx.
# Combined with services-deployment.yaml this gives all 10 services K8s coverage.

---
# ─────────────────────────────────────────────────────────────────────────────
# ADMIN PORTAL
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: gnwaas
  labels:
    app: admin-portal
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: admin-portal
    spec:
      containers:
        - name: admin-portal
          image: ghcr.io/arowtest/gn-waas/admin-portal:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: gnwaas-config
                  key: API_BASE_URL
            - name: VITE_KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: gnwaas-config
                  key: KEYCLOAK_URL
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101   # nginx user
            readOnlyRootFilesystem: false  # nginx needs /tmp and /var/cache
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: admin-portal-service
  namespace: gnwaas
spec:
  selector:
    app: admin-portal
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

