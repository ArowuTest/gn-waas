---
# ─────────────────────────────────────────────────────────────────────────────
# NAMESPACE + CONFIGMAP (shared config for all services)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: gnwaas
  labels:
    name: gnwaas

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gnwaas-config
  namespace: gnwaas
data:
  APP_ENV: "production"
  API_BASE_URL: "https://api.gnwaas.gov.gh"
  KEYCLOAK_URL: "https://auth.gnwaas.gov.gh"
  KEYCLOAK_REALM: "gnwaas"
  KEYCLOAK_CLIENT_ID: "api-gateway"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "gnwaas"
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "gnwaas-evidence"
  NATS_URL: "nats://nats-service:4222"
  SENTINEL_URL: "http://sentinel-service:3002"
  TARIFF_ENGINE_URL: "http://tariff-engine-service:3001"
  GRA_BRIDGE_URL: "http://gra-bridge-service:3003"
  OCR_SERVICE_URL: "http://ocr-service-service:3005"
