# GN-WAAS — Kubernetes NetworkPolicies
# Implements zero-trust networking: services can only communicate with
# explicitly permitted peers. Default-deny all ingress/egress.
#
# Architecture:
#   Internet → Ingress → api-gateway
#   api-gateway → sentinel, tariff-engine, gra-bridge, ocr-service, cdc-ingestor
#   sentinel → postgres, nats
#   tariff-engine → postgres
#   gra-bridge → postgres, external GRA VSDC API
#   cdc-ingestor → postgres, nats, gwl-db (external)
#   meter-ingestor → postgres, nats

---
# Default deny all ingress and egress for the gnwaas namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gnwaas
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS resolution (required for all pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: gnwaas
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# API Gateway: accept from ingress controller, talk to all internal services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
  namespace: gnwaas
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Internal services
    - to:
        - podSelector:
            matchLabels:
              app: sentinel
      ports:
        - port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: tariff-engine
      ports:
        - port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: gra-bridge
      ports:
        - port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: ocr-service
      ports:
        - port: 3005
    # MinIO
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
    # Keycloak (OIDC token validation)
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 8080

---
# Sentinel: accept from api-gateway, talk to postgres + nats
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentinel-netpol
  namespace: gnwaas
spec:
  podSelector:
    matchLabels:
      app: sentinel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3002
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: nats
      ports:
        - port: 4222

---
# GRA Bridge: accept from api-gateway, egress to postgres + external GRA API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gra-bridge-netpol
  namespace: gnwaas
spec:
  podSelector:
    matchLabels:
      app: gra-bridge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # External GRA VSDC API (HTTPS)
    - ports:
        - port: 443
          protocol: TCP

---
# Tariff Engine: accept from api-gateway, talk to postgres only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tariff-engine-netpol
  namespace: gnwaas
spec:
  podSelector:
    matchLabels:
      app: tariff-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432

---
# OCR Service: accept from api-gateway only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ocr-service-netpol
  namespace: gnwaas
spec:
  podSelector:
    matchLabels:
      app: ocr-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3005
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
