# GN-WAAS — Horizontal Pod Autoscalers
# Automatically scales pods based on CPU/memory utilization.
# Requires: metrics-server installed in the cluster
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

---
# API Gateway: scale 2→10 replicas based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: gnwaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30

---
# Sentinel: scale 1→5 replicas
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-hpa
  namespace: gnwaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# OCR Service: scale 1→4 replicas (CPU-intensive)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ocr-service-hpa
  namespace: gnwaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ocr-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # Lower threshold — OCR is CPU-intensive

---
# GRA Bridge: scale 1→4 replicas
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gra-bridge-hpa
  namespace: gnwaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gra-bridge
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ─────────────────────────────────────────────────────────────────────────────
# PodDisruptionBudgets
# Ensures at least 1 pod is always available during rolling updates/node drains
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: gnwaas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinel-pdb
  namespace: gnwaas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sentinel

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tariff-engine-pdb
  namespace: gnwaas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: tariff-engine

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gra-bridge-pdb
  namespace: gnwaas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gra-bridge
