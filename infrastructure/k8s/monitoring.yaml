---
# GN-WAAS Kubernetes Monitoring Stack
# Deploys Prometheus, Alertmanager, and Grafana into the monitoring namespace.
# The PrometheusRule CRD (from kube-prometheus-stack) is used for alert rules.
# If running without the Prometheus Operator, apply alert_rules.yml directly
# to the Prometheus ConfigMap instead.

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: gn-waas

---
# ── Prometheus ConfigMap ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        system: gn-waas
        environment: production

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [gnwaas]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

---
# ── Prometheus Alert Rules ConfigMap ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
  labels:
    app: prometheus
data:
  gnwaas_alerts.yml: |
    groups:
      - name: rls_security
        interval: 30s
        rules:

          # CRITICAL: RLS transaction failure — security degradation event.
          # The rls.Middleware logs "RLS middleware: failed to begin RLS transaction"
          # when it cannot start an RLS-activated transaction.  Any occurrence
          # means a request was served without district-level data isolation.
          - alert: RLSTransactionFailure
            expr: |
              increase(gnwaas_log_lines_total{
                service="api-gateway",
                level="warn",
                message=~".*RLS middleware.*failed to begin RLS transaction.*"
              }[5m]) > 0
            for: 0m
            labels:
              severity: critical
              team: security
              compliance: rls
            annotations:
              summary: "RLS enforcement bypassed on {{ $labels.service }}"
              description: |
                {{ $value }} request(s) in the last 5 minutes were served
                WITHOUT Row-Level Security enforcement on {{ $labels.service }}.
                District-level data isolation was NOT enforced for those requests.
                Immediate investigation required.
              runbook: https://wiki.gnwaas.gh/runbooks/rls-degradation

          - alert: RLSHighFailureRate
            expr: |
              (
                rate(gnwaas_log_lines_total{
                  service="api-gateway",
                  level="warn",
                  message=~".*RLS middleware.*failed.*"
                }[10m])
                /
                rate(http_requests_total{service="api-gateway"}[10m])
              ) > 0.01
            for: 5m
            labels:
              severity: critical
              team: security
              compliance: rls
            annotations:
              summary: "RLS failure rate above 1% on {{ $labels.service }}"
              description: |
                More than 1% of API requests are failing RLS transaction setup.
                Current rate: {{ $value | humanizePercentage }}.
              runbook: https://wiki.gnwaas.gh/runbooks/rls-degradation

      - name: service_health
        interval: 30s
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
              team: ops
            annotations:
              summary: "Service {{ $labels.service }} is down"
              description: "{{ $labels.service }} ({{ $labels.instance }}) has been unreachable for 1 minute."

          - alert: HighErrorRate
            expr: |
              rate(http_requests_total{status=~"5.."}[5m])
              /
              rate(http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
              team: ops
            annotations:
              summary: "High 5xx error rate on {{ $labels.service }}"
              description: "{{ $labels.service }} 5xx rate: {{ $value | humanizePercentage }}"

      - name: gra_compliance
        interval: 60s
        rules:
          - alert: GRABridgeHighFailureRate
            expr: rate(gnwaas_gra_submission_errors_total[10m]) > 0.1
            for: 5m
            labels:
              severity: critical
              team: compliance
            annotations:
              summary: "GRA E-VAT submission failures above threshold"
              description: "GRA bridge error rate: {{ $value | humanize }} errors/second"
              runbook: https://wiki.gnwaas.gh/runbooks/gra-bridge-failures

---
# ── Prometheus Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-alert-rules
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# ── Alertmanager ConfigMap ────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: 'ops-email'
      group_by: ['alertname', 'service', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            compliance: rls
          receiver: 'security-critical'
          group_wait: 0s
          repeat_interval: 30m
          continue: true
        - match:
            severity: critical
          receiver: 'oncall-pagerduty'
          group_wait: 10s
          repeat_interval: 1h
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['service']
    receivers:
      - name: 'security-critical'
        email_configs:
          - to: 'security@gnwaas.gh'
            subject: '[CRITICAL SECURITY] GN-WAAS RLS Degradation'
            send_resolved: true
      - name: 'oncall-pagerduty'
        email_configs:
          - to: 'oncall@gnwaas.gh'
            subject: '[CRITICAL] GN-WAAS Alert'
            send_resolved: true
      - name: 'ops-email'
        email_configs:
          - to: 'ops@gnwaas.gh'
            subject: '[GN-WAAS] Alert'
            send_resolved: true

---
# ── Alertmanager Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093

---
# ── Grafana Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

---
# ── Grafana Secret (override in production with sealed-secrets or Vault) ──────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: "change-me-in-production"
