<!DOCTYPE html>
<html>
<head>
  <!--
    GN-WAAS Field Officer App — Flutter Web Entry Point
    
    This file is required for `flutter build web` to succeed.
    It was missing from the repository, causing the web build to fail
    with "Error: No web/index.html found" (v32 finding: Flutter Web Build Issues).
    
    The project name in pubspec.yaml is `gnwaas_field_officer`.
    The Flutter web build outputs to build/web/.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GN-WAAS Field Officer App — GPS-locked meter reading and field job management for Ghana Water Limited field officers.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GN-WAAS Field">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GN-WAAS Field Officer</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by the build process; do not edit manually.
    var serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
