syntax = "proto3";

package meter;

option go_package = "github.com/ArowuTest/gn-waas/backend/meter-ingestor/proto/meter";

import "google/protobuf/timestamp.proto";

// ─── MeterReading ─────────────────────────────────────────────────────────────

message MeterReading {
  string  device_id        = 1;  // Physical meter serial / IoT device ID
  string  gwl_account_number = 2; // GWL account number this meter belongs to
  double  reading_m3       = 3;  // Cumulative reading in cubic metres
  double  flow_rate_m3h    = 4;  // Instantaneous flow rate (m³/hr), 0 if not available
  double  pressure_bar     = 5;  // Line pressure in bar, 0 if not available
  string  read_method      = 6;  // "AMR", "MANUAL", "GPRS", "NB_IOT"
  string  reader_id        = 7;  // Badge/device ID of reader (empty for AMR)
  google.protobuf.Timestamp reading_timestamp = 8;
  double  battery_voltage  = 9;  // IoT device battery (V), 0 if N/A
  bool    tamper_detected  = 10; // Tamper flag from smart meter
  string  district_code    = 11; // District code for routing
  map<string, string> metadata = 12; // Extensible key-value metadata
}

message MeterReadingResponse {
  bool   accepted        = 1;
  string reading_id      = 2;  // UUID assigned to this reading
  string message         = 3;
  bool   anomaly_flagged = 4;  // True if sentinel pre-check flagged this reading
  string anomaly_reason  = 5;
}

// ─── Batch submission ─────────────────────────────────────────────────────────

message BatchMeterReadings {
  repeated MeterReading readings = 1;
  string  source_system  = 2;  // "AMR_GATEWAY", "FIELD_APP", "MANUAL_UPLOAD"
  string  batch_id       = 3;  // Idempotency key
}

message BatchMeterReadingResponse {
  int32  accepted        = 1;
  int32  rejected        = 2;
  int32  anomaly_flagged = 3;
  repeated string errors = 4;
  string batch_id        = 5;
}

// ─── Query ────────────────────────────────────────────────────────────────────

message GetLatestReadingRequest {
  string gwl_account_number = 1;
}

message GetReadingHistoryRequest {
  string gwl_account_number = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to   = 3;
  int32  limit = 4;
}

message ReadingHistoryResponse {
  repeated MeterReading readings = 1;
  int32 total = 2;
}

// ─── Service definition ───────────────────────────────────────────────────────

service MeterIngestorService {
  // Submit a single meter reading (from field app or AMR gateway)
  rpc SubmitReading(MeterReading) returns (MeterReadingResponse);

  // Submit a batch of readings (from AMR gateway bulk upload)
  rpc SubmitBatch(BatchMeterReadings) returns (BatchMeterReadingResponse);

  // Streaming: AMR gateway streams readings in real time
  rpc StreamReadings(stream MeterReading) returns (BatchMeterReadingResponse);

  // Query latest reading for an account
  rpc GetLatestReading(GetLatestReadingRequest) returns (MeterReading);

  // Query reading history for an account
  rpc GetReadingHistory(GetReadingHistoryRequest) returns (ReadingHistoryResponse);
}
