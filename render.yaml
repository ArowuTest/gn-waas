# GN-WAAS Render Infrastructure-as-Code
# Deploy with: render blueprint apply

databases:
  - name: gnwaas-postgres
    databaseName: gnwaas
    user: gnwaas_app
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  # Uses runtime: docker so the Dockerfile is used.
  # The Dockerfile (backend/api-gateway/Dockerfile) copies database/migrations/
  # and database/seeds/ into the image at /app/migrations/ and /app/seeds/,
  # and sets MIGRATIONS_DIR=/app/migrations and SEEDS_DIR=/app/seeds.
  # dockerContext must be the repo root so the Dockerfile can COPY shared/go/
  # and COPY database/migrations/ (both relative to repo root).
  - type: web
    name: gnwaas-api-gateway
    runtime: docker
    dockerfilePath: ./backend/api-gateway/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        # "staging" enables dev-login for demo purposes.
        # Change to "production" + DEV_MODE=false to fully lock down.
        value: staging
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: DEV_MODE
        # P1-04 FIX: DEV_MODE is now false. The mock token bypass is removed.
        # Authentication uses proper HMAC-SHA256 signed JWTs (see jwtutil package).
        value: "false"
      - key: JWT_SECRET
        # IMPORTANT: Override this with a strong random secret in the Render dashboard.
        # Generate with: openssl rand -hex 32
        # This default is used only if the env var is not set in the dashboard.
        value: "gnwaas-change-this-secret-in-render-dashboard-min32chars"
      - key: LOG_LEVEL
        value: info
      - key: SENTINEL_SERVICE_URL
        fromService:
          name: gnwaas-sentinel
          type: web
          property: hostport
      - key: TARIFF_ENGINE_URL
        fromService:
          name: gnwaas-tariff-engine
          type: web
          property: hostport
      - key: GRA_BRIDGE_URL
        fromService:
          name: gnwaas-gra-bridge
          type: web
          property: hostport
      - key: KEYCLOAK_URL
        value: https://auth.gnwaas.nita.gov.gh
      - key: KEYCLOAK_REALM
        value: gnwaas
      - key: KEYCLOAK_CLIENT_ID
        value: gnwaas-api

  # ── Sentinel Engine ──────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-sentinel
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/sentinel
    buildCommand: go build -o sentinel ./cmd/main.go
    startCommand: ./sentinel
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString

  # ── Tariff Engine ────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-tariff-engine
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/tariff-engine
    buildCommand: go build -o tariff-engine ./cmd/main.go
    startCommand: ./tariff-engine
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require

  # ── GRA Bridge ───────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-gra-bridge
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/gra-bridge
    buildCommand: go build -o gra-bridge ./cmd/main.go
    startCommand: ./gra-bridge
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GRA_SANDBOX_MODE
        value: "true"
