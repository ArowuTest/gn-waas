# GN-WAAS Render Infrastructure-as-Code
# Deploy with: render blueprint apply

databases:
  - name: gnwaas-postgres
    databaseName: gnwaas
    user: gnwaas_app
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-api-gateway
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/api-gateway
    buildCommand: go build -o api-gateway ./cmd/main.go
    startCommand: ./api-gateway
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: DEV_MODE
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: SENTINEL_SERVICE_URL
        fromService:
          name: gnwaas-sentinel
          type: web
          property: hostport
      - key: TARIFF_ENGINE_URL
        fromService:
          name: gnwaas-tariff-engine
          type: web
          property: hostport
      - key: GRA_BRIDGE_URL
        fromService:
          name: gnwaas-gra-bridge
          type: web
          property: hostport
      - key: KEYCLOAK_URL
        value: https://auth.gnwaas.nita.gov.gh
      - key: KEYCLOAK_REALM
        value: gnwaas
      - key: KEYCLOAK_CLIENT_ID
        value: gnwaas-api
      - key: MIGRATIONS_DIR
        value: ./migrations

  # ── Sentinel Engine ──────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-sentinel
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/sentinel
    buildCommand: go build -o sentinel ./cmd/main.go
    startCommand: ./sentinel
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString

  # ── Tariff Engine ────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-tariff-engine
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/tariff-engine
    buildCommand: go build -o tariff-engine ./cmd/main.go
    startCommand: ./tariff-engine
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require

  # ── GRA Bridge ───────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-gra-bridge
    runtime: go
    region: oregon
    plan: free
    rootDir: backend/gra-bridge
    buildCommand: go build -o gra-bridge ./cmd/main.go
    startCommand: ./gra-bridge
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GRA_SANDBOX_MODE
        value: "true"
