# GN-WAAS Render Infrastructure-as-Code
# Deploy with: render blueprint apply

databases:
  - name: gnwaas-postgres
    databaseName: gnwaas
    user: gnwaas_app
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  # runtime: docker — uses backend/api-gateway/Dockerfile with dockerContext: .
  # (repo root) so the Dockerfile can COPY shared/go/ and COPY database/migrations/
  # relative to the root.  The Dockerfile bakes migrations + seeds into the image
  # at /app/migrations and /app/seeds and sets MIGRATIONS_DIR + SEEDS_DIR internally,
  # so those env vars are NOT overridden here.
  - type: web
    name: gnwaas-api-gateway
    runtime: docker
    region: oregon
    plan: free
    autoDeploy: yes
    dockerfilePath: backend/api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        # "staging" enables dev-login for demo purposes.
        # Change to "production" + DEV_MODE=false to fully lock down.
        value: staging
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: DEV_MODE
        # P1-04 FIX: DEV_MODE is now false. The mock token bypass is removed.
        # Authentication uses proper HMAC-SHA256 signed JWTs (see jwtutil package).
        value: "false"
      - key: JWT_SECRET
        # IMPORTANT: Override this with a strong random secret in the Render dashboard.
        # Generate with: openssl rand -hex 32
        # This default is used only if the env var is not set in the dashboard.
        value: "gnwaas-change-this-secret-in-render-dashboard-min32chars"
      - key: LOG_LEVEL
        value: info
      - key: SENTINEL_SERVICE_URL
        fromService:
          name: gnwaas-sentinel
          type: web
          property: hostport
      - key: TARIFF_ENGINE_URL
        fromService:
          name: gnwaas-tariff-engine
          type: web
          property: hostport
      - key: GRA_BRIDGE_URL
        fromService:
          name: gnwaas-gra-bridge
          type: web
          property: hostport
      - key: KEYCLOAK_URL
        value: https://auth.gnwaas.nita.gov.gh
      - key: KEYCLOAK_REALM
        value: gnwaas
      - key: KEYCLOAK_CLIENT_ID
        value: gnwaas-api
      - key: OCR_SERVICE_URL
        value: https://gnwaas-ocr-service.onrender.com
      # Evidence photo storage — set these to enable cloud photo storage
      # Supports: MinIO (self-hosted), AWS S3, Cloudflare R2, Backblaze B2
      # Leave blank to run in offline mode (photos stored on device only)
      - key: S3_ENDPOINT
        value: ""
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
      - key: S3_BUCKET
        value: gnwaas-evidence
      - key: S3_USE_SSL
        value: "true"

  # ── Sentinel Engine ──────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-sentinel
    runtime: go
    region: oregon
    plan: free
    autoDeploy: yes
    rootDir: backend/sentinel
    buildCommand: GOWORK=off go build -o sentinel ./cmd/main.go
    startCommand: ./sentinel
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString

  # ── Tariff Engine ────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-tariff-engine
    runtime: go
    region: oregon
    plan: free
    autoDeploy: yes
    rootDir: backend/tariff-engine
    buildCommand: GOWORK=off go build -o tariff-engine ./cmd/main.go
    startCommand: ./tariff-engine
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require

  # ── GRA Bridge ───────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-gra-bridge
    runtime: go
    region: oregon
    plan: free
    autoDeploy: yes
    rootDir: backend/gra-bridge
    buildCommand: GOWORK=off go build -o gra-bridge ./cmd/main.go
    startCommand: ./gra-bridge
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GRA_SANDBOX_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: gnwaas-postgres
          property: connectionString
      - key: DB_SSLMODE
        value: require

  # ── OCR Service ──────────────────────────────────────────────────────────────
  - type: web
    name: gnwaas-ocr-service
    runtime: docker
    dockerfilePath: ./backend/ocr-service/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    autoDeploy: yes
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: staging
      - key: TESSERACT_PATH
        value: tesseract
      - key: TEMP_DIR
        value: /tmp
      - key: PORT
        # Render routes external traffic to this port; ocr-service now reads PORT first.
        value: "10000"
      - key: APP_PORT
        value: "10000"

  # ── Frontend Static Sites ─────────────────────────────────────────────────────
  # Each portal is a Vite SPA deployed as a Render static site.
  # The landing page includes public/*.html legal pages copied to dist/ on build.

  - type: web
    name: gnwaas-landing
    runtime: static
    region: oregon
    autoDeploy: yes
    rootDir: frontend/landing
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /privacy-policy.html
        destination: /privacy-policy.html
      - type: rewrite
        source: /terms-of-use.html
        destination: /terms-of-use.html
      - type: rewrite
        source: /data-protection.html
        destination: /data-protection.html
      - type: rewrite
        source: /evat-compliance.html
        destination: /evat-compliance.html
      - type: rewrite
        source: /accessibility.html
        destination: /accessibility.html
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: gnwaas-admin-portal
    runtime: static
    region: oregon
    autoDeploy: yes
    rootDir: frontend/admin-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: gnwaas-gwl-portal
    runtime: static
    region: oregon
    autoDeploy: yes
    rootDir: frontend/gwl-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: gnwaas-authority-portal
    runtime: static
    region: oregon
    autoDeploy: yes
    rootDir: frontend/authority-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
