version: '3.9'

# GN-WAAS Local Development Environment
# Ghana National Water Audit & Assurance System
# Run: docker-compose up -d

networks:
  gnwaas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  keycloak_data:
  redis_data:
  minio_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

services:

  # ============================================================
  # PostgreSQL + TimescaleDB (Primary Database)
  # ============================================================
  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: gnwaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gnwaas
      POSTGRES_USER: gnwaas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnwaas_user -d gnwaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (Caching + WebSocket pub/sub + Job queues)
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: gnwaas-redis
    restart: unless-stopped
    command: redis-server --requirepass gnwaas_redis_2026 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gnwaas_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Keycloak (Self-hosted Identity Provider - RBAC)
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: gnwaas-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: gnwaas_user
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-gnwaas_keycloak_admin_2026}
      KC_REALM_NAME: gnwaas
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infrastructure/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.12

  # ============================================================
  # MinIO (Object Storage - meter photos, OCR evidence)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: gnwaas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gnwaas_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gnwaas_minio_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================================
  # API Gateway (Go - main entry point)
  # ============================================================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: gnwaas-api-gateway
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: gnwaas_redis_2026
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: gnwaas
      KEYCLOAK_CLIENT_ID: gnwaas-api
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-gnwaas_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-gnwaas_minio_2026}
      SENTINEL_SERVICE_URL: http://sentinel:3002
      TARIFF_SERVICE_URL: http://tariff-engine:3003
      GRA_SERVICE_URL: http://gra-bridge:3004
      OCR_SERVICE_URL: http://ocr-service:3005
      CDC_SERVICE_URL: http://cdc-ingestor:3006
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.20

  # ============================================================
  # Sentinel Service (Go - fraud detection engine)
  # ============================================================
  sentinel:
    build:
      context: ./backend/sentinel
      dockerfile: Dockerfile
    container_name: gnwaas-sentinel
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: gnwaas_redis_2026
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.22

  # ============================================================
  # Tariff Engine (Go - PURC 2026 billing calculator)
  # ============================================================
  tariff-engine:
    build:
      context: ./backend/tariff-engine
      dockerfile: Dockerfile
    container_name: gnwaas-tariff-engine
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.23

  # ============================================================
  # GRA Bridge (Go - VSDC API v8.1 integration)
  # ============================================================
  gra-bridge:
    build:
      context: ./backend/gra-bridge
      dockerfile: Dockerfile
    container_name: gnwaas-gra-bridge
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      GRA_API_BASE_URL: https://vsdc.gra.gov.gh/api/v8.1
      GRA_API_KEY: ""
      GRA_BUSINESS_TIN: ""
      GRA_SANDBOX_MODE: "${GRA_SANDBOX_MODE:-true}"
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.24

  # ============================================================
  # OCR Service (Go + Tesseract)
  # ============================================================
  ocr-service:
    build:
      context: ./backend/ocr-service
      dockerfile: Dockerfile
    container_name: gnwaas-ocr-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-gnwaas_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-gnwaas_minio_2026}
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.25

  # ============================================================
  # CDC Ingestor (Go - GWL database change capture)
  # ============================================================
  cdc-ingestor:
    build:
      context: ./backend/cdc-ingestor
      dockerfile: Dockerfile
    container_name: gnwaas-cdc-ingestor
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 3006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gnwaas_dev_password_2026}
      GWL_DB_HOST: ""
      GWL_DB_PORT: "5432"
      GWL_DB_NAME: ""
      GWL_DB_USER: ""
      GWL_DB_PASSWORD: ""
      GWL_SCHEMA_MAP_PATH: /app/config/gwl_schema_map.yaml
    ports:
      - "3006:3006"
    volumes:
      - ./config/gwl_schema_map.yaml:/app/config/gwl_schema_map.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.26

  # ============================================================
  # Admin Portal (TypeScript/React 19)
  # ============================================================
  admin-portal:
    build:
      context: ./frontend/admin-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: gnwaas
        VITE_KEYCLOAK_CLIENT_ID: gnwaas-admin
        VITE_MAPBOX_TOKEN: ""
    container_name: gnwaas-admin-portal
    restart: unless-stopped
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - api-gateway
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.30



  # ============================================================
  # GWL Portal (React/TS — GWL case management portal)
  # ============================================================
  gwl-portal:
    build:
      context: ./frontend/gwl-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: gnwaas
        VITE_KEYCLOAK_CLIENT_ID: gnwaas-gwl
    container_name: gnwaas-gwl-portal
    restart: unless-stopped
    ports:
      - "5174:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - api-gateway
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.32

  # ============================================================
  # Authority Portal (React/TS — GN-WAAS authority dashboard)
  # ============================================================
  authority-portal:
    build:
      context: ./frontend/authority-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: gnwaas
        VITE_KEYCLOAK_CLIENT_ID: gnwaas-authority
    container_name: gnwaas-authority-portal
    restart: unless-stopped
    ports:
      - "5175:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - api-gateway
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.33

  # ============================================================
  # Meter Ingestor (gRPC + HTTP — real-time meter reading ingestion)
  # ============================================================
  meter-ingestor:
    build:
      context: .
      dockerfile: backend/meter-ingestor/Dockerfile
    container_name: gnwaas-meter-ingestor
    restart: unless-stopped
    ports:
      - "3007:3007"   # HTTP REST API
      - "50051:50051" # gRPC server
    environment:
      APP_PORT: "3007"
      GRPC_PORT: "50051"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: gnwaas
      DB_USER: gnwaas_user
      DB_PASSWORD: ${DB_PASSWORD:-gnwaas_dev_password}
      DB_SSL_MODE: disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.32

  # ============================================================
  # Demo Seed Runner (one-shot container to populate demo data)
  # Run: docker-compose run --rm seed-runner
  # ============================================================
  seed-runner:
    image: postgres:16-alpine
    container_name: gnwaas-seed-runner
    profiles:
      - seed
    environment:
      PGPASSWORD: ${DB_PASSWORD:-gnwaas_dev_password}
    volumes:
      - ./database/migrations:/migrations
      - ./database/seeds:/seeds
    command: >
      sh -c "
        echo 'Running GN-WAAS database migrations...' &&
        for f in /migrations/*.sql; do
          echo "  Applying: $$f" &&
          psql -h postgres -U gnwaas_user -d gnwaas -f $$f || exit 1
        done &&
        echo 'Running GN-WAAS seed data...' &&
        for f in /seeds/0*.sql; do
          echo "  Seeding: $$f" &&
          psql -h postgres -U gnwaas_user -d gnwaas -f $$f || exit 1
        done &&
        echo 'Database seeding complete!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      gnwaas-network:

  # ============================================================
  # NATS Message Broker (async event bus between services)
  # ============================================================
  nats:
    image: nats:2.10-alpine
    container_name: gnwaas-nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: >
      --name gnwaas-nats
      --http_port 8222
      --max_payload 1MB
      --max_connections 1000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.31

  # ============================================================
  # MONITORING STACK
  # Prometheus → scrapes metrics from all services
  # Alertmanager → fires alerts on RLS degradation and other
  #                critical events; routes to ops email/Slack
  # Grafana → dashboards for NRW, RLS health, service latency
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: gnwaas-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.40

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gnwaas-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.41

  grafana:
    image: grafana/grafana:10.4.2
    container_name: gnwaas-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-gnwaas-grafana-secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      gnwaas-network:
        ipv4_address: 172.20.0.42
