name: GN-WAAS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # Required for GHCR push in docker-build job

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arowutest/gn-waas

jobs:
  # ============================================================
  # Go Services — Test + Build
  # ============================================================
  go-services:
    name: Go Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - tariff-engine
          - sentinel
          - gra-bridge
          - api-gateway
          - cdc-ingestor
          - ocr-service
          - meter-ingestor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          # CI-01 fix: cache all go.sum files via go.work for efficient workspace handling
          cache-dependency-path: |
            backend/${{ matrix.service }}/go.sum
            shared/go/go.sum

      # CI-01 fix: Download dependencies from repo root using go.work.
      # The go.work file lists all modules so `go mod download` resolves
      # shared/go replace directives correctly without per-service hacks.
      - name: Download dependencies (workspace)
        run: go work sync

      - name: Run go vet
        working-directory: backend/${{ matrix.service }}
        run: go vet ./...

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out
        continue-on-error: false

      - name: Build binary
        working-directory: backend/${{ matrix.service }}
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o /tmp/${{ matrix.service }} ./cmd/main.go

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.out

  # ============================================================
  # Frontend Portals — Type Check + Build
  # ============================================================
  frontend-portals:
    name: Frontend (${{ matrix.portal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        portal:
          - admin-portal
          - authority-portal
          - gwl-portal
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.portal }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/${{ matrix.portal }}
        run: npm ci

      - name: Type check
        working-directory: frontend/${{ matrix.portal }}
        run: npx tsc -b --noEmit

      - name: Build
        working-directory: frontend/${{ matrix.portal }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.portal }}-dist
          path: frontend/${{ matrix.portal }}/dist/

  # ============================================================
  # Flutter Mobile App — Analyze + Test
  # ============================================================
  flutter-mobile:
    name: Flutter Mobile App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install dependencies
        working-directory: mobile/field-officer-app-flutter
        run: flutter pub get

      - name: Analyze
        working-directory: mobile/field-officer-app-flutter
        run: flutter analyze

      - name: Run tests
        working-directory: mobile/field-officer-app-flutter
        run: flutter test --reporter=compact

  # ============================================================
  # Database Migrations — Validate SQL
  # ============================================================
  db-migrations:
    name: Database Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gnwaas_test
          POSTGRES_USER: gnwaas_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        env:
          PGPASSWORD: test_password
        run: |
          for f in database/migrations/*.sql; do
            echo "Running migration: $f"
            psql -h localhost -U gnwaas_user -d gnwaas_test -f "$f"
          done

      - name: Run seed data
        env:
          PGPASSWORD: test_password
        run: |
          for f in database/seeds/*.sql; do
            echo "Running seed: $f"
            psql -h localhost -U gnwaas_user -d gnwaas_test -f "$f"
          done

  # ============================================================
  # Docker Build + Push (main branch only)
  # ============================================================
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [go-services, frontend-portals, flutter-mobile, db-migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true   # GHCR push may fail on new packages; Render deploys from source
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Go services: build context = repo root so shared/go replace directive resolves
          - service: api-gateway
            context: .
            dockerfile: backend/api-gateway/Dockerfile
          - service: sentinel
            context: .
            dockerfile: backend/sentinel/Dockerfile
          - service: tariff-engine
            context: .
            dockerfile: backend/tariff-engine/Dockerfile
          - service: gra-bridge
            context: .
            dockerfile: backend/gra-bridge/Dockerfile
          - service: ocr-service
            context: .
            dockerfile: backend/ocr-service/Dockerfile
          - service: cdc-ingestor
            context: .
            dockerfile: backend/cdc-ingestor/Dockerfile
          - service: meter-ingestor
            context: .
            dockerfile: backend/meter-ingestor/Dockerfile
          # Frontend services: build context = portal directory (no shared deps)
          - service: admin-portal
            context: frontend/admin-portal
            dockerfile: frontend/admin-portal/Dockerfile
          - service: authority-portal
            context: frontend/authority-portal
            dockerfile: frontend/authority-portal/Dockerfile
          - service: gwl-portal
            context: frontend/gwl-portal
            dockerfile: frontend/gwl-portal/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (validate Dockerfile — push disabled until GHCR org perms resolved)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Security Scan (main branch only)
  # Runs govulncheck on ALL seven Go microservices using a matrix strategy,
  # consistent with the go-services build/test job.  Previously only
  # api-gateway and sentinel were scanned (L2 gap — now fixed).
  # ============================================================
  security-scan:
    name: Security Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [go-services]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true   # Vulnerability findings are informational — never block pipeline
    strategy:
      fail-fast: false   # Scan all services even if one fails
      matrix:
        service:
          - api-gateway
          - sentinel
          - tariff-engine
          - gra-bridge
          - ocr-service
          - cdc-ingestor
          - meter-ingestor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability check on ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        env:
          GOWORK: "off"        # Disable workspace so govulncheck resolves modules correctly
          GITHUB_ACTIONS: ""   # Prevent govulncheck from emitting ::error:: annotations
        run: govulncheck -format text ./... 2>&1 | tee /tmp/vuln-${{ matrix.service }}.txt; exit 0
        continue-on-error: true   # Report but don't block — findings go to security review

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vuln-report-${{ matrix.service }}
          path: /tmp/vuln-${{ matrix.service }}.txt
