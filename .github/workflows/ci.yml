name: GN-WAAS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arowtest/gn-waas

jobs:
  # ============================================================
  # Go Services — Test + Build
  # ============================================================
  go-services:
    name: Go Services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - tariff-engine
          - sentinel
          - gra-bridge
          - api-gateway
          - cdc-ingestor
          - ocr-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out
        continue-on-error: true  # Tests may not exist yet in early phases

      - name: Build binary
        working-directory: services/${{ matrix.service }}
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" ./cmd/main.go

      - name: Run go vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

  # ============================================================
  # Admin Portal — Build + Type Check
  # ============================================================
  admin-portal:
    name: Admin Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin-portal/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin-portal
        run: npm ci

      - name: Type check
        working-directory: apps/admin-portal
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/admin-portal
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-portal-dist
          path: apps/admin-portal/dist/

  # ============================================================
  # Database Migrations — Validate SQL
  # ============================================================
  db-migrations:
    name: Database Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-latest
        env:
          POSTGRES_DB: gnwaas_test
          POSTGRES_USER: gnwaas_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        env:
          PGPASSWORD: test_password
        run: |
          for f in database/migrations/*.sql; do
            echo "Running migration: $f"
            psql -h localhost -U gnwaas_user -d gnwaas_test -f "$f"
          done

      - name: Run seed data
        env:
          PGPASSWORD: test_password
        run: |
          for f in database/seeds/*.sql; do
            echo "Running seed: $f"
            psql -h localhost -U gnwaas_user -d gnwaas_test -f "$f"
          done

  # ============================================================
  # Docker Build + Push (main branch only)
  # ============================================================
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [go-services, admin-portal, db-migrations]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
          - service: sentinel
            context: services/sentinel
          - service: tariff-engine
            context: services/tariff-engine
          - service: gra-bridge
            context: services/gra-bridge
          - service: ocr-service
            context: services/ocr-service
          - service: cdc-ingestor
            context: services/cdc-ingestor
          - service: admin-portal
            context: apps/admin-portal
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
